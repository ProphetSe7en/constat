name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: go test -race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ui/go.mod
          cache-dependency-path: ui/go.sum
      - name: vet
        working-directory: ui
        run: go vet ./...
      - name: test with race detector
        working-directory: ui
        run: go test -race -count=1 ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    # Advisory-only: docker/docker currently has an upstream-unfixed CVE
    # (GO-2026-4887, Moby AuthZ plugin bypass). That vuln is daemon-side;
    # Constat is a Docker *client*, so the call paths govulncheck flags are
    # not exploitable in our usage. Continue-on-error keeps the scan running
    # and visible in the CI summary, but doesn't block merges. Re-evaluate
    # when the Moby team ships a patched release and we can bump.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ui/go.mod
          cache-dependency-path: ui/go.sum
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: scan
        working-directory: ui
        run: govulncheck ./...
